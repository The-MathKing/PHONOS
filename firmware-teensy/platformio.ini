; ============================================================================
; SSI Neuro-Prosthetic — PlatformIO Configuration
; Target: Teensy 4.1 (NXP IMXRT1062, ARM Cortex-M7 @ 600 MHz)
; ============================================================================

[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; ── Compiler Optimizations ───────────────────────────────────────────────────
; -O3           : Aggressive optimization (speed over size)
; -mcpu=cortex-m7 : Target Cortex-M7 instruction set
; -mfpu=fpv5-d16  : Enable double-precision FPU (VFPv5-D16)
; -mfloat-abi=hard: Use hardware FP ABI (registers for FP args/return values)
; -ffast-math   : Allow FP reassociation for SIMD vectorization
; NOTE: ARM_MATH_CM7 is intentionally omitted — the Teensyduino framework
;       defines it internally in arm_math.h, adding it here causes a
;       harmless redefinition warning from the Audio library.
build_flags =
    -O3
    -mcpu=cortex-m7
    -mfpu=fpv5-d16
    -mfloat-abi=hard
    -ffast-math
    -D__FPU_PRESENT=1
    -DUSE_TEENSY_AUDIO=1

; ── Library Dependencies ─────────────────────────────────────────────────────
; Audio  : Official Teensyduino Audio library (FFT, mixer, I2S)
; SD     : Teensy's SD card library (onboard SDIO interface on Teensy 4.1)
; SPI    : Required by SD
; tflite-micro (local): TensorFlow Lite for Microcontrollers stub (lib/tflite-micro)
lib_deps =
    Audio
    SD
    SPI

; Resolve local lib path for tflite-micro stub
lib_extra_dirs = lib

; ── Upload & Monitor ─────────────────────────────────────────────────────────
upload_protocol = teensy-gui
monitor_speed   = 115200

; ── Build & Source Filters ───────────────────────────────────────────────────
build_src_filter = +<*>
build_type = debug
