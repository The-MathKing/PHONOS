; ============================================================================
; SSI Neuro-Prosthetic — PlatformIO Configuration
; Target: Teensy 4.1 (NXP IMXRT1062, ARM Cortex-M7 @ 600 MHz)
; ============================================================================

[env]
platform  = teensy
board     = teensy41
framework = arduino
upload_protocol = teensy-gui
monitor_speed   = 115200
lib_deps =
    Audio
    SD
    SPI
lib_extra_dirs = lib
build_type = release

; Common Compiler Optimizations
build_flags =
    -O3
    -mcpu=cortex-m7
    -mfpu=fpv5-d16
    -mfloat-abi=hard
    -ffast-math
    -D__FPU_PRESENT=1
    -DUSE_TEENSY_AUDIO=1

; ── Phase A: Digital Proof (Synthetic Data) ──────────────────────────────────
[env:phase_a]
build_flags = 
    ${env.build_flags}
    -D PHASE_A
build_src_filter = +<*> -<main.cpp> -<main_phase_b.cpp> -<main_phase_c.cpp> +<main_phase_a.cpp>

; ── Phase B: Analog Hardware & Real-Time DSP ─────────────────────────────────
[env:phase_b]
build_flags = 
    ${env.build_flags}
    -D PHASE_B
build_src_filter = +<*> -<main.cpp> -<main_phase_a.cpp> -<main_phase_c.cpp> +<main_phase_b.cpp>

; ── Phase C: Human-in-the-Loop & Emotion Synthesis ───────────────────────────
[env:phase_c]
build_flags = 
    ${env.build_flags}
    -D PHASE_C
    -D AUDIO_BLOCK_SAMPLES=64
build_src_filter = +<*> -<main.cpp> -<main_phase_a.cpp> -<main_phase_b.cpp> +<main_phase_c.cpp>
